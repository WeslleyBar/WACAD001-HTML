<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ATIVIDADE HTML3</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #eee;
        }

        .container {
            width: 80%;
            margin: 20px auto;
            background: #ddd;
            padding: 10px;
        }

        header {
            background: #f26c7c;
            text-align: center;
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        nav {
            background: #3fc1a9;
            text-align: center;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .content {
            display: flex;
            gap: 10px;
        }

        aside {
            background: #e6b0b7;
            width: 25%;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        main {
            background: #a8d0e6;
            width: 75%;
            padding: 10px;
            border-radius: 8px;
        }

        article {
            background: #5dade2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
        }

        figure {
            background: #f9e79f;
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
        }

        p {
            background: #d4ef9f;
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
        }

        section {
            background: #3498db;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        footer {
            background: #a569bd;
            text-align: center;
            padding: 20px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        &lt;header&gt;
    </header>

    <nav>
        &lt;nav&gt;
    </nav>

    <div class="content">

        <aside>
            &lt;aside&gt;
        </aside>

        <main>
            &lt;main&gt;

            <article>
                &lt;article&gt;

                <figure>
                    &lt;figure&gt;
                </figure>

                <p>
                    &lt;p&gt;
                </p>

            </article>

            <section>
                &lt;section&gt;
            </section>

        </main>

    </div>

    <footer>
        &lt;footer&gt;
    </footer>

</div>

</body>
</html>
